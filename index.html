<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        #art-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
        }

        .intro {
            font-size: clamp(1rem, 2vw, 1.4rem);
            line-height: 2;
            color: rgba(255, 255, 255, 0.9);
            max-width: 500px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }

        .bg-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .bg-dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .bg-dot::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            opacity: 0.8;
        }

        .bg-dot:nth-child(1)::before {
            background: radial-gradient(circle at 30% 30%, #f0d4e8, #d4a5c7, #a8c8ec);
        }

        .bg-dot:nth-child(2)::before {
            background: radial-gradient(circle at 30% 30%, #ffd700, #d4a574, #1a1a4e);
        }

        .bg-dot:nth-child(3)::before {
            background: radial-gradient(circle at 30% 30%, #ffd700, #f4a460, #e8c9a8);
        }

        .bg-dot.active {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .bg-hint {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            pointer-events: none;
            opacity: 0;
            animation: fadeHint 3s ease 1s forwards;
        }

        @keyframes fadeHint {
            0%, 100% { opacity: 0; }
            30%, 70% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <canvas id="art-canvas"></canvas>
    <div class="cursor" id="cursor"></div>

    <div class="content">
        <h1>Hello I'm Claudia</h1>
        <p class="intro">
            热爱技术与创造的探索者<br>
            喜欢将想象变为现实<br>
            让我们一起创造无限可能
        </p>
    </div>

    <div class="bg-hint">点击切换</div>
    <div class="bg-indicator">
        <div class="bg-dot active" data-bg="0"></div>
        <div class="bg-dot" data-bg="1"></div>
        <div class="bg-dot" data-bg="2"></div>
    </div>

    <script>
        // 三种主题配色 - 精确提取自参考图片
        const themes = [
            {
                name: 'pink-dream',
                colors: {
                    bg: ['#e8d5e0', '#d4c4e0', '#c9d4e8'],
                    swirl: ['#f0d4e8', '#e8c4d9', '#d4a5c7', '#a8c8ec', '#c9b8e0'],
                    stars: ['#ffffff', '#fff5f8', '#f0f8ff'],
                    gold: '#f5e6d3'
                }
            },
            {
                name: 'blue-gold',
                colors: {
                    bg: ['#0d1a2e', '#1a1a4e', '#2d1b69'],
                    swirl: ['#ff8c42', '#ffb347', '#4a2c7a', '#6b3d8f', '#1e3a5f'],
                    stars: ['#ffffff', '#fff8dc', '#ffd700', '#ffe4b5'],
                    gold: '#ffd700'
                }
            },
            {
                name: 'warm-gold',
                colors: {
                    bg: ['#f5e6d3', '#e8d4c4', '#d4c4b0'],
                    swirl: ['#ffd700', '#f4a460', '#ff7f50', '#e8c9a8', '#d4a574'],
                    stars: ['#ffffff', '#fffacd', '#ffe4b5'],
                    gold: '#ffd700'
                }
            }
        ];

        let currentTheme = 0;

        const canvas = document.getElementById('art-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let prevMouseX = 0, prevMouseY = 0;

        // 噪声函数
        class SimpleNoise {
            constructor() {
                this.perm = new Uint8Array(512);
                for (let i = 0; i < 256; i++) this.perm[i] = i;
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.perm[i], this.perm[j]] = [this.perm[j], this.perm[i]];
                }
                for (let i = 0; i < 256; i++) this.perm[i + 256] = this.perm[i];
            }

            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            lerp(t, a, b) { return a + t * (b - a); }
            grad(hash, x, y) {
                const h = hash & 15;
                const u = h < 8 ? x : y;
                const v = h < 4 ? y : h === 12 || h === 14 ? x : 0;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }

            noise(x, y) {
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;
                x -= Math.floor(x);
                y -= Math.floor(y);
                const u = this.fade(x);
                const v = this.fade(y);
                const A = this.perm[X] + Y, B = this.perm[X + 1] + Y;

                return this.lerp(v,
                    this.lerp(u, this.grad(this.perm[A], x, y), this.grad(this.perm[B], x - 1, y)),
                    this.lerp(u, this.grad(this.perm[A + 1], x, y - 1), this.grad(this.perm[B + 1], x - 1, y - 1))
                );
            }
        }

        const noise = new SimpleNoise();

        // 流体艺术系统
        class FluidArt {
            constructor() {
                this.time = 0;
                this.stars = [];
                this.initStars();
            }

            initStars() {
                this.stars = [];
                for (let i = 0; i < 100; i++) {
                    this.stars.push({
                        x: Math.random(),
                        y: Math.random(),
                        size: Math.random() * 2 + 0.5,
                        brightness: Math.random(),
                        twinkle: Math.random() * Math.PI * 2
                    });
                }
            }

            // 绘制流体漩涡纹理
            drawFluidTexture(colors) {
                const imageData = ctx.createImageData(width, height);
                const data = imageData.data;

                const cx = width / 2;
                const cy = height / 2;
                const time = this.time * 0.0003;

                // 预计算颜色
                const parseColor = (hex) => ({
                    r: parseInt(hex.slice(1, 3), 16),
                    g: parseInt(hex.slice(3, 5), 16),
                    b: parseInt(hex.slice(5, 7), 16)
                });

                const bgColors = colors.bg.map(parseColor);
                const swirlColors = colors.swirl.map(parseColor);

                for (let y = 0; y < height; y += 2) {
                    for (let x = 0; x < width; x += 2) {
                        const dx = x - cx;
                        const dy = y - cy;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const angle = Math.atan2(dy, dx);

                        // 漩涡扭曲
                        const twist = angle + dist * 0.002 + time;
                        const n1 = noise.noise(
                            Math.cos(twist) * dist * 0.003 + time,
                            Math.sin(twist) * dist * 0.003
                        );
                        const n2 = noise.noise(
                            x * 0.002 + n1 * 0.5,
                            y * 0.002 + time * 0.5
                        );

                        // 混合颜色
                        const mix = (n1 + 1) * 0.5;
                        const mix2 = (n2 + 1) * 0.5;

                        // 选择基础色
                        const bgIndex = Math.floor(mix * (bgColors.length - 1));
                        const bg1 = bgColors[bgIndex];
                        const bg2 = bgColors[Math.min(bgIndex + 1, bgColors.length - 1)];
                        const bgT = mix * (bgColors.length - 1) - bgIndex;

                        // 选择漩涡色
                        const swirlIndex = Math.floor(mix2 * (swirlColors.length - 1));
                        const s1 = swirlColors[swirlIndex];
                        const s2 = swirlColors[Math.min(swirlIndex + 1, swirlColors.length - 1)];
                        const sT = mix2 * (swirlColors.length - 1) - swirlIndex;

                        // 插值
                        const blend = Math.min(dist / (Math.max(width, height) * 0.6), 1);
                        const finalMix = blend * 0.7 + n2 * 0.3;

                        const r = Math.floor(
                            this.lerp(finalMix,
                                this.lerp(bgT, bg1.r, bg2.r),
                                this.lerp(sT, s1.r, s2.r)
                            )
                        );
                        const g = Math.floor(
                            this.lerp(finalMix,
                                this.lerp(bgT, bg1.g, bg2.g),
                                this.lerp(sT, s1.g, s2.g)
                            )
                        );
                        const b = Math.floor(
                            this.lerp(finalMix,
                                this.lerp(bgT, bg1.b, bg2.b),
                                this.lerp(sT, s1.b, s2.b)
                            )
                        );

                        // 填充2x2像素块
                        for (let dy = 0; dy < 2 && y + dy < height; dy++) {
                            for (let dx = 0; dx < 2 && x + dx < width; dx++) {
                                const i = ((y + dy) * width + (x + dx)) * 4;
                                data[i] = r;
                                data[i + 1] = g;
                                data[i + 2] = b;
                                data[i + 3] = 255;
                            }
                        }
                    }
                }

                ctx.putImageData(imageData, 0, 0);
            }

            lerp(t, a, b) {
                return a + t * (b - a);
            }

            // 绘制星星
            drawStars(colors) {
                const starColors = colors.stars;

                this.stars.forEach(star => {
                    const x = star.x * width;
                    const y = star.y * height;
                    const twinkle = Math.sin(this.time * 0.002 + star.twinkle);
                    const alpha = star.brightness * (0.5 + 0.5 * twinkle);

                    const color = starColors[Math.floor(star.x * starColors.length)];
                    ctx.fillStyle = color;
                    ctx.globalAlpha = alpha;

                    // 绘制星星
                    ctx.beginPath();
                    ctx.arc(x, y, star.size, 0, Math.PI * 2);
                    ctx.fill();

                    // 星光十字
                    if (star.size > 1.2) {
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 0.5;
                        const glow = star.size * 3;
                        ctx.beginPath();
                        ctx.moveTo(x - glow, y);
                        ctx.lineTo(x + glow, y);
                        ctx.moveTo(x, y - glow);
                        ctx.lineTo(x, y + glow);
                        ctx.stroke();
                    }
                });

                ctx.globalAlpha = 1;
            }

            // 绘制交互波纹
            drawInteraction() {
                const dx = mouseX - prevMouseX;
                const dy = mouseY - prevMouseY;
                const speed = Math.sqrt(dx * dx + dy * dy);

                if (speed > 3) {
                    const theme = themes[currentTheme];
                    const gradient = ctx.createRadialGradient(
                        mouseX, mouseY, 0,
                        mouseX, mouseY, 100
                    );
                    gradient.addColorStop(0, theme.colors.gold + '40');
                    gradient.addColorStop(0.5, theme.colors.gold + '20');
                    gradient.addColorStop(1, 'transparent');

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(mouseX, mouseY, 100, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            update() {
                this.time += 16;
            }

            draw() {
                const theme = themes[currentTheme];
                this.drawFluidTexture(theme.colors);
                this.drawStars(theme.colors);
                this.drawInteraction();
            }
        }

        const fluidArt = new FluidArt();

        function init() {
            resize();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            fluidArt.initStars();
        }

        let lastDraw = 0;
        function animate(timestamp) {
            if (timestamp - lastDraw > 50) { // 20fps for performance
                fluidArt.update();
                fluidArt.draw();
                lastDraw = timestamp;
            }

            prevMouseX = mouseX;
            prevMouseY = mouseY;

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 切换主题
        function switchTheme(index) {
            if (index === undefined) {
                currentTheme = (currentTheme + 1) % themes.length;
            } else {
                currentTheme = index;
            }

            document.querySelectorAll('.bg-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentTheme);
            });

            fluidArt.initStars();
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.bg-indicator')) {
                switchTheme();
            }
        });

        document.querySelectorAll('.bg-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                switchTheme(parseInt(dot.dataset.bg));
            });
        });

        init();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
