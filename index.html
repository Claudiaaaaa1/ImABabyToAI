<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudia - Liquid Dreams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        .layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #bottom-layer {
            z-index: 0;
        }

        #top-layer {
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        .intro {
            font-size: clamp(1rem, 2vw, 1.4rem);
            line-height: 2;
            color: rgba(255, 255, 255, 0.9);
            max-width: 500px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease;
            mix-blend-mode: difference;
        }

        .cursor.active {
            width: 50px;
            height: 50px;
        }

        .bg-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 15px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        .bg-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 2px solid rgba(255, 255, 255, 0.4);
            position: relative;
        }

        .bg-dot.active {
            transform: scale(1.2);
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .bg-dot:nth-child(1) {
            background: linear-gradient(135deg, #e8c4d9, #a8c8ec);
        }

        .bg-dot:nth-child(2) {
            background: linear-gradient(135deg, #1a1a4e, #d4a574);
        }

        .bg-dot:nth-child(3) {
            background: linear-gradient(135deg, #f4a460, #ffd700);
        }

        .bg-hint {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            pointer-events: none;
            opacity: 0;
            animation: fadeHint 3s ease 1s forwards;
        }

        @keyframes fadeHint {
            0%, 100% { opacity: 0; }
            30%, 70% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <!-- 下层：被揭示的颜色 -->
    <canvas id="bottom-layer" class="layer"></canvas>
    <!-- 上层：被拨开的颜色 -->
    <canvas id="top-layer" class="layer"></canvas>

    <div class="cursor" id="cursor"></div>

    <div class="content">
        <h1>Hello I'm Claudia</h1>
        <p class="intro">
            热爱技术与创造的探索者<br>
            喜欢将想象变为现实<br>
            让我们一起创造无限可能
        </p>
    </div>

    <div class="bg-hint">划过水面，拨开银河</div>
    <div class="bg-indicator">
        <div class="bg-dot active" data-bg="0"></div>
        <div class="bg-dot" data-bg="1"></div>
        <div class="bg-dot" data-bg="2"></div>
    </div>

    <script>
        // 三种主题：上层颜色 -> 下层颜色
        const themes = [
            {
                name: 'pink-blue',
                top: {      // 上层：粉紫色（被拨开）
                    colors: ['#e8c4d9', '#d4a5c7', '#c9b8e0'],
                    base: '#d4a5c7'
                },
                bottom: {   // 下层：蓝色（显露出来）
                    colors: ['#a8c8ec', '#7ab8e8', '#4a90d9'],
                    base: '#7ab8e8',
                    stars: ['#ffffff', '#e0f0ff', '#a8d8ff']
                }
            },
            {
                name: 'blue-gold',
                top: {      // 上层：深蓝色（被拨开）
                    colors: ['#1a1a4e', '#2d1b69', '#4a2c7a'],
                    base: '#1a1a4e'
                },
                bottom: {   // 下层：金色（显露出来）
                    colors: ['#ffd700', '#ffb347', '#ff8c42'],
                    base: '#ffb347',
                    stars: ['#ffffff', '#fff8dc', '#ffd700']
                }
            },
            {
                name: 'orange-gold',
                top: {      // 上层：橙色（被拨开）
                    colors: ['#f4a460', '#d4a574', '#c49a6c'],
                    base: '#d4a574'
                },
                bottom: {   // 下层：金黄色（显露出来）
                    colors: ['#ffd700', '#ffec8b', '#daa520'],
                    base: '#ffd700',
                    stars: ['#ffffff', '#fffacd', '#ffe4b5']
                }
            }
        ];

        let currentTheme = 0;

        const bottomCanvas = document.getElementById('bottom-layer');
        const topCanvas = document.getElementById('top-layer');
        const bottomCtx = bottomCanvas.getContext('2d');
        const topCtx = topCanvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let mouseTrail = [];

        // 噪声函数
        class SimpleNoise {
            constructor() {
                this.perm = new Uint8Array(512);
                for (let i = 0; i < 256; i++) this.perm[i] = i;
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.perm[i], this.perm[j]] = [this.perm[j], this.perm[i]];
                }
                for (let i = 0; i < 256; i++) this.perm[i + 256] = this.perm[i];
            }

            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            lerp(t, a, b) { return a + t * (b - a); }
            grad(hash, x, y) {
                const h = hash & 15;
                const u = h < 8 ? x : y;
                const v = h < 4 ? y : h === 12 || h === 14 ? x : 0;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }

            noise(x, y) {
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;
                x -= Math.floor(x);
                y -= Math.floor(y);
                const u = this.fade(x);
                const v = this.fade(y);
                const A = this.perm[X] + Y, B = this.perm[X + 1] + Y;

                return this.lerp(v,
                    this.lerp(u, this.grad(this.perm[A], x, y), this.grad(this.perm[B], x - 1, y)),
                    this.lerp(u, this.grad(this.perm[A + 1], x, y - 1), this.grad(this.perm[B + 1], x - 1, y - 1))
                );
            }
        }

        const noise = new SimpleNoise();

        // 绘制流体背景
        function drawFluid(ctx, colors, time, isBottom) {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;

            const cx = width / 2;
            const cy = height / 2;
            const t = time * 0.0002;

            const colorList = colors.colors;
            const parsedColors = colorList.map(hex => ({
                r: parseInt(hex.slice(1, 3), 16),
                g: parseInt(hex.slice(3, 5), 16),
                b: parseInt(hex.slice(5, 7), 16)
            }));

            for (let y = 0; y < height; y += 2) {
                for (let x = 0; x < width; x += 2) {
                    const dx = x - cx;
                    const dy = y - cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);

                    // 漩涡扭曲
                    const twist = angle + dist * 0.003 + t;
                    const n1 = noise.noise(
                        Math.cos(twist) * dist * 0.005 + t * 0.5,
                        Math.sin(twist) * dist * 0.005
                    );
                    const n2 = noise.noise(
                        x * 0.003 + n1 * 0.3,
                        y * 0.003 + t
                    );

                    const mix = (n1 + 1) * 0.5;
                    const mix2 = (n2 + 1) * 0.5;

                    const colorIdx = Math.floor(mix * (parsedColors.length - 1));
                    const c1 = parsedColors[colorIdx];
                    const c2 = parsedColors[Math.min(colorIdx + 1, parsedColors.length - 1)];
                    const ct = mix * (parsedColors.length - 1) - colorIdx;

                    const r = Math.floor(c1.r + ct * (c2.r - c1.r));
                    const g = Math.floor(c1.g + ct * (c2.g - c1.g));
                    const b = Math.floor(c1.b + ct * (c2.b - c1.b));

                    for (let dy = 0; dy < 2 && y + dy < height; dy++) {
                        for (let dx = 0; dx < 2 && x + dx < width; dx++) {
                            const i = ((y + dy) * width + (x + dx)) * 4;
                            data[i] = r;
                            data[i + 1] = g;
                            data[i + 2] = b;
                            data[i + 3] = 255;
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);

            // 如果是下层，添加星星
            if (isBottom && colors.stars) {
                drawStars(ctx, colors.stars, time);
            }
        }

        function drawStars(ctx, starColors, time) {
            for (let i = 0; i < 60; i++) {
                const x = ((i * 137.5 + time * 0.05) % 1) * width;
                const y = ((i * 73.3 + Math.sin(time * 0.001 + i) * 0.1) % 1) * height;
                const twinkle = Math.sin(time * 0.003 + i * 0.5);
                const alpha = 0.4 + 0.4 * twinkle;
                const size = 0.5 + Math.sin(i) * 0.5;

                const color = starColors[i % starColors.length];
                ctx.fillStyle = color;
                ctx.globalAlpha = alpha;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();

                if (size > 0.8) {
                    ctx.globalAlpha = alpha * 0.5;
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 0.5;
                    const glow = size * 4;
                    ctx.beginPath();
                    ctx.moveTo(x - glow, y);
                    ctx.lineTo(x + glow, y);
                    ctx.moveTo(x, y - glow);
                    ctx.lineTo(x, y + glow);
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1;
        }

        // 鼠标轨迹系统 - 像墨水一样的软边痕迹
        class MouseTrailSystem {
            constructor() {
                this.points = [];
                this.maxPoints = 50;
            }

            addPoint(x, y) {
                this.points.push({
                    x, y,
                    time: Date.now(),
                    size: 80 + Math.random() * 40
                });

                if (this.points.length > this.maxPoints) {
                    this.points.shift();
                }
            }

            // 在顶层画布上"擦除"（绘制透明区域）
            applyToTopLayer(ctx) {
                const now = Date.now();
                const fadeTime = 4000; // 4秒恢复

                ctx.save();

                this.points.forEach(point => {
                    const age = now - point.time;
                    if (age < fadeTime) {
                        const opacity = 1 - (age / fadeTime);
                        const softEdge = point.size * (0.8 + opacity * 0.4);

                        // 创建软边渐变
                        const gradient = ctx.createRadialGradient(
                            point.x, point.y, 0,
                            point.x, point.y, softEdge
                        );

                        // 从中心完全透明到边缘半透明
                        gradient.addColorStop(0, `rgba(0, 0, 0, ${opacity * 0.9})`);
                        gradient.addColorStop(0.4, `rgba(0, 0, 0, ${opacity * 0.6})`);
                        gradient.addColorStop(0.7, `rgba(0, 0, 0, ${opacity * 0.3})`);
                        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, softEdge, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });

                ctx.restore();

                // 清理旧点
                this.points = this.points.filter(p => now - p.time < fadeTime);
            }
        }

        const trailSystem = new MouseTrailSystem();

        function init() {
            resize();
        }

        function resize() {
            width = bottomCanvas.width = topCanvas.width = window.innerWidth;
            height = bottomCanvas.height = topCanvas.height = window.innerHeight;
        }

        let lastTime = 0;
        let time = 0;

        function animate(timestamp) {
            time += 16;

            // 每帧重新绘制底层（动态效果）
            const theme = themes[currentTheme];
            drawFluid(bottomCtx, theme.bottom, time, true);

            // 绘制顶层（静态或慢速变化）
            if (time - lastTime > 100) { // 降低顶层刷新频率
                drawFluid(topCtx, theme.top, time * 0.3, false);
                lastTime = time;
            }

            // 应用鼠标轨迹（"拨开"效果）
            trailSystem.applyToTopLayer(topCtx);

            requestAnimationFrame(animate);
        }

        // 鼠标移动
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // 添加轨迹点
            const dx = mouseX - prevMouseX;
            const dy = mouseY - prevMouseY;
            const speed = Math.sqrt(dx * dx + dy * dy);

            if (speed > 5) {
                trailSystem.addPoint(mouseX, mouseY);
            }

            prevMouseX = mouseX;
            prevMouseY = mouseY;

            // 更新光标
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            document.getElementById('cursor').classList.add('active');
            // 点击产生大范围的"拨开"
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    trailSystem.addPoint(
                        mouseX + (Math.random() - 0.5) * 60,
                        mouseY + (Math.random() - 0.5) * 60
                    );
                }, i * 50);
            }
        });

        document.addEventListener('mouseup', () => {
            document.getElementById('cursor').classList.remove('active');
        });

        // 触摸支持
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const dx = touch.clientX - prevMouseX;
            const dy = touch.clientY - prevMouseY;
            const speed = Math.sqrt(dx * dx + dy * dy);

            if (speed > 5) {
                trailSystem.addPoint(touch.clientX, touch.clientY);
            }

            prevMouseX = touch.clientX;
            prevMouseY = touch.clientY;
        }, { passive: true });

        // 切换主题
        function switchTheme(index) {
            if (index === undefined) {
                currentTheme = (currentTheme + 1) % 3;
            } else {
                currentTheme = index;
            }

            document.querySelectorAll('.bg-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentTheme);
            });

            // 清空轨迹，重新开始
            trailSystem.points = [];
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.bg-indicator')) {
                switchTheme();
            }
        });

        document.querySelectorAll('.bg-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                switchTheme(parseInt(dot.dataset.bg));
            });
        });

        window.addEventListener('resize', resize);

        init();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
