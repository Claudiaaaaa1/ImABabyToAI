<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudia - Silk Dreams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
        }

        .intro {
            font-size: clamp(1rem, 2vw, 1.4rem);
            line-height: 2;
            color: rgba(255, 255, 255, 0.92);
            max-width: 500px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.1);
        }

        .cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: width 0.15s, height 0.15s, border-width 0.15s;
        }

        .cursor.dragging {
            width: 14px;
            height: 14px;
            border-width: 2px;
            background: rgba(255, 255, 255, 0.15);
        }

        .bg-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 15px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: auto;
        }

        .bg-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 2px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .bg-dot::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 芭比粉 × 苔绿 */
        .bg-dot:nth-child(1)::before {
            background: linear-gradient(135deg, #F1BBC9 50%, #4D613C 50%);
        }

        /* 薄香 × 松果褐 */
        .bg-dot:nth-child(2)::before {
            background: linear-gradient(135deg, #F5F5DC 50%, #8B4513 50%);
        }

        /* 奶油粉 × 竹月色 */
        .bg-dot:nth-child(3)::before {
            background: linear-gradient(135deg, #FFF0F5 50%, #C5E1A5 50%);
        }

        .bg-dot.active {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="cursor" id="cursor"></div>

    <div class="content">
        <h1>Hello I'm Claudia</h1>
        <p class="intro">
            热爱技术与创造的探索者<br>
            喜欢将想象变为现实<br>
            让我们一起创造无限可能
        </p>
    </div>

    <div class="bg-indicator">
        <div class="bg-dot active" data-bg="0"></div>
        <div class="bg-dot" data-bg="1"></div>
        <div class="bg-dot" data-bg="2"></div>
    </div>

    <script>
        // 三种对角线配色主题 - 小红书参考色值
        // 左上颜色 / 右下颜色
        const themes = [
            {
                name: 'barbie-moss',
                topLeft: '#F1BBC9',       // 芭比粉 - 柔和粉红
                bottomRight: '#4D613C',   // 苔绿 - 深橄榄绿
                textShadow: '0 2px 10px rgba(0,0,0,0.25)'
            },
            {
                name: 'xiang-pine',
                topLeft: '#F5F5DC',       // 薄香 - 米色/米白
                bottomRight: '#8B4513',   // 松果褐 - 深棕色
                textShadow: '0 2px 10px rgba(0,0,0,0.4)'
            },
            {
                name: 'cream-bamboo',
                topLeft: '#FFF0F5',       // 奶油粉 - 淡粉色
                bottomRight: '#C5E1A5',   // 竹月色 - 淡竹绿
                textShadow: '0 2px 10px rgba(0,0,0,0.15)'
            }
        ];

        let currentTheme = 0;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        // 绘制对角线分割背景
        function drawBackground(theme) {
            // 清空
            ctx.fillStyle = theme.topLeft;
            ctx.fillRect(0, 0, width, height);

            // 绘制右下三角形（对角线分割）
            ctx.fillStyle = theme.bottomRight;
            ctx.beginPath();
            ctx.moveTo(width, 0);
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fill();

            // 添加微妙的渐变过渡
            const gradient = ctx.createLinearGradient(0, height, width, 0);
            gradient.addColorStop(0, 'rgba(255,255,255,0)');
            gradient.addColorStop(0.45, 'rgba(255,255,255,0)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.3)');
            gradient.addColorStop(0.55, 'rgba(255,255,255,0)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 丝绸覆盖层（用于被拨开的效果）
        let silkCanvas, silkCtx;

        function initSilk() {
            silkCanvas = document.createElement('canvas');
            silkCanvas.width = width;
            silkCanvas.height = height;
            silkCtx = silkCanvas.getContext('2d');
            drawSilk();
        }

        function drawSilk() {
            const theme = themes[currentTheme];

            // 绘制丝绸纹理（覆盖在对角线上）
            silkCtx.clearRect(0, 0, width, height);

            // 创建丝绸质感的覆盖层
            const imageData = silkCtx.createImageData(width, height);
            const data = imageData.data;

            const tl = hexToRgb(theme.topLeft);
            const br = hexToRgb(theme.bottomRight);

            for (let y = 0; y < height; y += 4) {
                for (let x = 0; x < width; x += 4) {
                    // 对角线判断
                    const diag = x / width + y / height;
                    const isTopLeft = diag < 1;

                    // 添加噪声纹理模拟丝绸
                    const noise = (Math.random() - 0.5) * 15;

                    let r, g, b;
                    if (isTopLeft) {
                        r = Math.min(255, tl.r + noise);
                        g = Math.min(255, tl.g + noise);
                        b = Math.min(255, tl.b + noise);
                    } else {
                        r = Math.min(255, br.r + noise);
                        g = Math.min(255, br.g + noise);
                        b = Math.min(255, br.b + noise);
                    }

                    // 填充4x4像素块
                    for (let dy = 0; dy < 4 && y + dy < height; dy++) {
                        for (let dx = 0; dx < 4 && x + dx < width; dx++) {
                            const i = ((y + dy) * width + (x + dx)) * 4;
                            data[i] = r;
                            data[i + 1] = g;
                            data[i + 2] = b;
                            data[i + 3] = 255;
                        }
                    }
                }
            }

            silkCtx.putImageData(imageData, 0, 0);
        }

        // 推开效果区域
        let clearedAreas = [];
        const maxAreas = 30;
        const fadeTime = 3000; // 3秒恢复

        function addClearedArea(x, y, size) {
            clearedAreas.push({
                x, y, size,
                time: Date.now(),
                opacity: 1
            });

            if (clearedAreas.length > maxAreas) {
                clearedAreas.shift();
            }
        }

        function updateClearedAreas() {
            const now = Date.now();
            clearedAreas = clearedAreas.filter(area => {
                const age = now - area.time;
                if (age < fadeTime) {
                    area.opacity = 1 - (age / fadeTime);
                    return true;
                }
                return false;
            });
        }

        function render() {
            const theme = themes[currentTheme];

            // 绘制基础对角线背景
            drawBackground(theme);

            // 绘制覆盖的丝绸层
            if (!silkCanvas) initSilk();

            // 使用遮罩实现推开效果
            ctx.save();

            // 创建临时画布用于遮罩
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = width;
            maskCanvas.height = height;
            const maskCtx = maskCanvas.getContext('2d');

            // 遮罩：黑色=不透明，白色=透明
            maskCtx.fillStyle = 'black';
            maskCtx.fillRect(0, 0, width, height);

            // 推开区域是白色（透明）
            updateClearedAreas();
            clearedAreas.forEach(area => {
                const gradient = maskCtx.createRadialGradient(
                    area.x, area.y, 0,
                    area.x, area.y, area.size
                );
                gradient.addColorStop(0, `rgba(255,255,255,${area.opacity})`);
                gradient.addColorStop(0.5, `rgba(255,255,255,${area.opacity * 0.5})`);
                gradient.addColorStop(1, 'rgba(255,255,255,0)');

                maskCtx.fillStyle = gradient;
                maskCtx.beginPath();
                maskCtx.arc(area.x, area.y, area.size, 0, Math.PI * 2);
                maskCtx.fill();
            });

            // 应用遮罩
            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(maskCanvas, 0, 0);

            // 绘制丝绸
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(silkCanvas, 0, 0);

            ctx.restore();

            // 添加星光点缀
            drawStars();

            // 更新光标
            const cursor = document.getElementById('cursor');
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';

            requestAnimationFrame(render);
        }

        function drawStars() {
            const time = Date.now() * 0.001;
            const theme = themes[currentTheme];
            const isDarkTheme = currentTheme === 1; // 薄香×松果褐

            ctx.fillStyle = isDarkTheme ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.7)';

            for (let i = 0; i < 40; i++) {
                const x = ((i * 137.5 + time * 8) % 1) * width;
                const y = ((i * 73.3 + Math.sin(time + i) * 30) % 1) * height;
                const twinkle = Math.sin(time * 2 + i * 0.5);
                const alpha = 0.4 + 0.4 * twinkle;
                const size = 0.5 + Math.sin(i) * 0.3;

                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function hexToRgb(hex) {
            return {
                r: parseInt(hex.slice(1, 3), 16),
                g: parseInt(hex.slice(3, 5), 16),
                b: parseInt(hex.slice(5, 7), 16)
            };
        }

        function init() {
            resize();
            render();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initSilk();
        }

        // 鼠标事件
        let lastX = mouseX, lastY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // 鼠标移动时添加推开区域
            const dx = mouseX - lastX;
            const dy = mouseY - lastY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 10) {
                addClearedArea(mouseX, mouseY, 60 + Math.random() * 40);
                lastX = mouseX;
                lastY = mouseY;
            }
        });

        document.addEventListener('mousedown', () => {
            document.getElementById('cursor').classList.add('dragging');
            // 点击产生大范围推开
            addClearedArea(mouseX, mouseY, 120);
        });

        document.addEventListener('mouseup', () => {
            document.getElementById('cursor').classList.remove('dragging');
        });

        // 触摸支持
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;

            const dx = mouseX - lastX;
            const dy = mouseY - lastY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 10) {
                addClearedArea(mouseX, mouseY, 60 + Math.random() * 40);
                lastX = mouseX;
                lastY = mouseY;
            }
        }, { passive: true });

        // 切换主题
        function switchTheme(index) {
            currentTheme = index !== undefined ? index : (currentTheme + 1) % 3;

            document.querySelectorAll('.bg-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentTheme);
            });

            // 重置推开区域
            clearedAreas = [];

            // 重新初始化丝绸
            initSilk();

            // 更新文字阴影
            const theme = themes[currentTheme];
            document.querySelector('h1').style.textShadow = theme.textShadow;
            document.querySelector('.intro').style.textShadow = theme.textShadow;
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.bg-indicator')) {
                switchTheme();
            }
        });

        document.querySelectorAll('.bg-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                switchTheme(parseInt(dot.dataset.bg));
            });
        });

        window.addEventListener('resize', () => {
            resize();
            initSilk();
        });

        // 启动
        init();
    </script>
</body>
</html>
