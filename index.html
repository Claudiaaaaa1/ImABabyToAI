<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudia - Color Dreams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Playfair Display', serif;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            pointer-events: none;
        }

        .title-wrapper {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInUp 1.2s ease-out;
        }

        .greeting {
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Playfair Display', 'Noto Serif SC', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 400;
            letter-spacing: 0.05em;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            opacity: 0.7;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: currentColor;
            margin: 40px auto;
            opacity: 0.4;
        }

        .intro {
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            line-height: 2.2;
            max-width: 420px;
            text-align: center;
            font-weight: 300;
            letter-spacing: 0.08em;
            animation: fadeInUp 1.2s ease-out 0.3s both;
        }

        .intro-line {
            display: block;
            margin: 8px 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 光标 */
        .cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            border: 1.5px solid;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-width 0.2s, transform 0.1s;
            mix-blend-mode: difference;
        }

        .cursor.dragging {
            width: 40px;
            height: 40px;
            border-width: 1px;
        }

        .cursor-trail {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            opacity: 0.6;
        }

        /* 切换指示器 */
        .bg-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 16px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .bg-dot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
        }

        .bg-dot::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease;
        }

        /* 芭比粉 × 苔绿 */
        .bg-dot:nth-child(1)::before {
            background: linear-gradient(135deg, #F1BBC9 50%, #4D613C 50%);
        }

        /* 薄香 × 松果褐 */
        .bg-dot:nth-child(2)::before {
            background: linear-gradient(135deg, #DBC6B4 50%, #664B3A 50%);
        }

        /* 奶油粉 × 竹月色 */
        .bg-dot:nth-child(3)::before {
            background: linear-gradient(135deg, #F3D8C3 50%, #6090B8 50%);
        }

        .bg-dot:hover {
            transform: scale(1.1);
        }

        .bg-dot.active {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        /* 页码指示 */
        .page-indicator {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .page-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .page-dot.active {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.5);
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            opacity: 0;
            animation: fadeInOut 4s ease 1s forwards;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="cursor" id="cursor"></div>

    <div class="content" id="content">
        <div class="title-wrapper">
            <div class="greeting" id="greeting">Welcome to</div>
            <h1 id="title">Claudia's Space</h1>
            <div class="subtitle" id="subtitle">探索 · 创造 · 梦想</div>
            <div class="divider"></div>
        </div>
        <p class="intro" id="intro">
            <span class="intro-line">热爱技术与艺术的探索者</span>
            <span class="intro-line">用代码描绘心中的色彩</span>
            <span class="intro-line">让想象成为现实</span>
        </p>
    </div>

    <div class="hint" id="hint">点击切换色彩</div>

    <div class="bg-indicator">
        <div class="bg-dot active" data-bg="0"></div>
        <div class="bg-dot" data-bg="1"></div>
        <div class="bg-dot" data-bg="2"></div>
    </div>

    <div class="page-indicator">
        <div class="page-dot active" data-page="0"></div>
        <div class="page-dot" data-page="1"></div>
        <div class="page-dot" data-page="2"></div>
    </div>

    <script>
        // 三种配色主题 - 准确色值
        const themes = [
            {
                name: 'barbie-moss',
                colors: {
                    left: '#F1BBC9',      // 芭比粉
                    right: '#4D613C'      // 苔绿
                },
                text: {
                    greeting: 'Pink & Moss',
                    title: 'Claudia',
                    subtitle: '温柔 · 生机 · 希望',
                    intro: ['在粉色的梦境中', '寻找生命的绿意', '让温柔与力量共存'],
                    hint: '滑动鼠标，拨开色彩'
                },
                style: {
                    textColor: '#FFFFFF',
                    textShadow: '0 2px 20px rgba(0,0,0,0.3)',
                    cursorColor: '#FFFFFF'
                }
            },
            {
                name: 'xiang-pine',
                colors: {
                    left: '#DBC6B4',      // 薄香
                    right: '#664B3A'      // 松果褐
                },
                text: {
                    greeting: 'Warm & Earthy',
                    title: 'Claudia',
                    subtitle: '自然 · 质朴 · 沉淀',
                    intro: ['如薄香般温暖', '似松果般沉稳', '在时光中沉淀自我'],
                    hint: '滑动鼠标，感受温暖'
                },
                style: {
                    textColor: '#F5F0E8',
                    textShadow: '0 2px 20px rgba(0,0,0,0.4)',
                    cursorColor: '#F5F0E8'
                }
            },
            {
                name: 'cream-bamboo',
                colors: {
                    left: '#F3D8C3',      // 奶油粉
                    right: '#6090B8'      // 竹月色
                },
                text: {
                    greeting: 'Cream & Moon',
                    title: 'Claudia',
                    subtitle: '宁静 · 清澈 · 自由',
                    intro: ['奶油般的温柔', '月光般的清澈', '在宁静中寻找自由'],
                    hint: '滑动鼠标，探索宁静'
                },
                style: {
                    textColor: '#FFFFFF',
                    textShadow: '0 2px 20px rgba(0,0,0,0.25)',
                    cursorColor: '#FFFFFF'
                }
            }
        ];

        let currentTheme = 0;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let targetX = mouseX;
        let targetY = mouseY;

        // 丝绸粒子系统
        class SilkParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.life = Math.random() * 100;
            }

            update(mouseDistance) {
                this.x += this.vx;
                this.y += this.vy;
                this.life += 0.02;

                // 鼠标影响
                if (mouseDistance < 100) {
                    const force = (100 - mouseDistance) / 100;
                    this.vx += (Math.random() - 0.5) * force * 0.5;
                    this.vy += (Math.random() - 0.5) * force * 0.5;
                }

                // 边界处理
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }

                // 阻尼
                this.vx *= 0.99;
                this.vy *= 0.99;
            }

            draw(ctx, color) {
                ctx.globalAlpha = this.alpha * (0.7 + 0.3 * Math.sin(this.life));
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        const particles = Array.from({ length: 50 }, () => new SilkParticle());

        // 推开波纹
        let ripples = [];

        function addRipple(x, y) {
            ripples.push({
                x, y,
                radius: 0,
                maxRadius: 150,
                alpha: 1,
                time: Date.now()
            });
        }

        function updateRipples() {
            const now = Date.now();
            ripples = ripples.filter(r => {
                const age = now - r.time;
                if (age < 2000) {
                    r.radius = (age / 2000) * r.maxRadius;
                    r.alpha = 1 - (age / 2000);
                    return true;
                }
                return false;
            });
        }

        // 绘制对角线背景
        function drawBackground(theme) {
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, theme.colors.left);
            gradient.addColorStop(0.5, theme.colors.left);
            gradient.addColorStop(0.5, theme.colors.right);
            gradient.addColorStop(1, theme.colors.right);

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 添加对角线柔和过渡
            const diagGradient = ctx.createLinearGradient(0, height, width, 0);
            diagGradient.addColorStop(0, 'rgba(255,255,255,0)');
            diagGradient.addColorStop(0.48, 'rgba(255,255,255,0)');
            diagGradient.addColorStop(0.5, 'rgba(255,255,255,0.15)');
            diagGradient.addColorStop(0.52, 'rgba(255,255,255,0)');
            diagGradient.addColorStop(1, 'rgba(255,255,255,0)');

            ctx.fillStyle = diagGradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 绘制推开效果
        function drawRevealEffect(theme) {
            // 鼠标位置推开上层
            const dx = mouseX - width / 2;
            const dy = mouseY - height / 2;

            // 绘制波纹
            ripples.forEach(r => {
                const gradient = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, r.radius);
                gradient.addColorStop(0, `rgba(255,255,255,${r.alpha * 0.3})`);
                gradient.addColorStop(0.5, `rgba(255,255,255,${r.alpha * 0.1})`);
                gradient.addColorStop(1, 'rgba(255,255,255,0)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // 鼠标周围的光晕
            const mouseGradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 120);
            mouseGradient.addColorStop(0, 'rgba(255,255,255,0.2)');
            mouseGradient.addColorStop(0.5, 'rgba(255,255,255,0.05)');
            mouseGradient.addColorStop(1, 'rgba(255,255,255,0)');

            ctx.fillStyle = mouseGradient;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 120, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制粒子
        function drawParticles(theme) {
            const isDark = currentTheme === 1;
            const particleColor = isDark ? '#F5F0E8' : '#FFFFFF';

            particles.forEach(p => {
                const dist = Math.sqrt((p.x - mouseX) ** 2 + (p.y - mouseY) ** 2);
                p.update(dist);
                p.draw(ctx, particleColor);
            });
        }

        // 更新文字内容
        function updateText(theme) {
            document.getElementById('greeting').textContent = theme.text.greeting;
            document.getElementById('title').textContent = theme.text.title;
            document.getElementById('subtitle').textContent = theme.text.subtitle;

            const introLines = document.querySelectorAll('.intro-line');
            theme.text.intro.forEach((line, i) => {
                if (introLines[i]) introLines[i].textContent = line;
            });

            document.getElementById('hint').textContent = theme.text.hint;

            // 更新样式
            const content = document.getElementById('content');
            content.style.color = theme.style.textColor;
            content.style.textShadow = theme.style.textShadow;

            const cursor = document.getElementById('cursor');
            cursor.style.borderColor = theme.style.cursorColor;
            cursor.style.boxShadow = `0 0 10px ${theme.style.cursorColor}80`;
        }

        // 渲染循环
        function render() {
            // 平滑鼠标跟随
            mouseX += (targetX - mouseX) * 0.15;
            mouseY += (targetY - mouseY) * 0.15;

            const theme = themes[currentTheme];

            // 绘制背景
            drawBackground(theme);

            // 绘制推开效果
            drawRevealEffect(theme);

            // 绘制粒子
            drawParticles(theme);

            // 更新波纹
            updateRipples();

            // 更新光标位置
            const cursor = document.getElementById('cursor');
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';

            requestAnimationFrame(render);
        }

        function init() {
            resize();
            updateText(themes[currentTheme]);
            render();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 鼠标事件
        document.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        document.addEventListener('mousedown', () => {
            document.getElementById('cursor').classList.add('dragging');
            addRipple(mouseX, mouseY);

            // 连续波纹
            for (let i = 1; i <= 3; i++) {
                setTimeout(() => {
                    addRipple(
                        mouseX + (Math.random() - 0.5) * 60,
                        mouseY + (Math.random() - 0.5) * 60
                    );
                }, i * 100);
            }
        });

        document.addEventListener('mouseup', () => {
            document.getElementById('cursor').classList.remove('dragging');
        });

        // 触摸支持
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            targetX = touch.clientX;
            targetY = touch.clientY;
        }, { passive: true });

        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            addRipple(touch.clientX, touch.clientY);
        }, { passive: true });

        // 切换主题
        function switchTheme(index) {
            currentTheme = index !== undefined ? index : (currentTheme + 1) % 3;

            // 更新指示器
            document.querySelectorAll('.bg-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentTheme);
            });

            document.querySelectorAll('.page-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentTheme);
            });

            // 更新文字
            updateText(themes[currentTheme]);

            // 重置粒子
            particles.forEach(p => p.reset());
            ripples = [];
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.bg-indicator') && !e.target.closest('.page-indicator')) {
                switchTheme();
            }
        });

        document.querySelectorAll('.bg-dot, .page-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                const index = parseInt(dot.dataset.bg || dot.dataset.page);
                switchTheme(index);
            });
        });

        window.addEventListener('resize', resize);

        // 启动
        init();
    </script>
</body>
</html>
