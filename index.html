<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudia - Liquid Dreams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        #fluid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            pointer-events: none;
        }

        .title-container {
            position: relative;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.95) 0%,
                rgba(255, 255, 255, 0.8) 50%,
                rgba(255, 255, 255, 0.6) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.3));
            animation: titlePulse 4s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 50px rgba(255, 255, 255, 0.5)); }
        }

        .title-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: -1;
        }

        .intro {
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            line-height: 2;
            color: rgba(255, 255, 255, 0.9);
            max-width: 600px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .intro .highlight {
            font-style: italic;
            font-weight: 600;
            color: rgba(255, 255, 255, 1);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .cursor-glow {
            position: fixed;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(circle,
                rgba(255, 255, 255, 0.2) 0%,
                rgba(255, 255, 255, 0.1) 30%,
                transparent 60%
            );
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            transition: opacity 0.3s ease;
        }

        .cursor-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
        }

        .bg-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: auto;
        }

        .bg-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .bg-dot.active {
            transform: scale(1.3);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px currentColor;
        }

        .bg-dot:hover {
            transform: scale(1.2);
        }

        .bg-hint {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out 1s forwards;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="fluid-canvas"></canvas>
    <div class="cursor-glow" id="cursor"></div>

    <div class="content">
        <div class="title-container">
            <div class="title-glow">Hello I'm Claudia</div>
            <h1>Hello I'm Claudia</h1>
        </div>
        <p class="intro">
            热爱技术与创造的探索者，喜欢将想象变为现实。<br>
            目前正在学习 Web 开发，期待用代码构建美好的数字世界。<br>
            <span class="highlight">让我们一起创造无限可能！</span>
        </p>
    </div>

    <div class="bg-hint">点击任意处切换背景</div>
    <div class="bg-indicator" id="bgIndicator">
        <div class="bg-dot active" data-bg="0" style="background: linear-gradient(135deg, #e8d5e0, #d4a5c7, #a8c8ec);" title="粉紫梦幻"></div>
        <div class="bg-dot" data-bg="1" style="background: linear-gradient(135deg, #1a1a4e, #4a2c7a, #ff8c42);" title="深蓝金辉"></div>
        <div class="bg-dot" data-bg="2" style="background: linear-gradient(135deg, #f4a460, #ff7f50, #ffd700);" title="暖橙金霞"></div>
    </div>

    <script>
        // 三种流体主题配置 - 配色来自参考图片
        const themes = [
            {
                name: 'dreamy',
                // 粉紫梦幻 - 柔和粉蓝紫
                colors: {
                    base: ['#f0e6f0', '#e8d5e0', '#d4c4e0'],
                    swirl: ['#e8c4d9', '#c9b8e0', '#a8c8ec', '#f0d4e0'],
                    highlight: '#fff5f8',
                    star: ['#ffffff', '#fff0f5', '#f0f8ff', '#ffe4e1'],
                    glow: 'rgba(255, 240, 245, 0.3)'
                }
            },
            {
                name: 'nebula',
                // 深蓝金辉 - 深邃蓝紫+橙金
                colors: {
                    base: ['#0a0a1a', '#1a1a4e', '#2d1b69'],
                    swirl: ['#4a2c7a', '#6b3d8f', '#ff8c42', '#ffb347'],
                    highlight: '#ffd700',
                    star: ['#ffffff', '#fff8dc', '#ffd700', '#ffebcd'],
                    glow: 'rgba(255, 215, 0, 0.25)'
                }
            },
            {
                name: 'golden',
                // 暖橙金霞 - 温暖橙金渐变
                colors: {
                    base: ['#fff5e6', '#ffe4c4', '#ffdab9'],
                    swirl: ['#f4a460', '#ff7f50', '#ffa500', '#ffd700'],
                    highlight: '#fff8dc',
                    star: ['#ffffff', '#fffacd', '#ffe4b5', '#ffefd5'],
                    glow: 'rgba(255, 248, 220, 0.3)'
                }
            }
        ];

        let currentTheme = 0;

        // Canvas setup
        const canvas = document.getElementById('fluid-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let prevMouseX = 0, prevMouseY = 0;

        // 流体波纹系统
        class FluidSystem {
            constructor() {
                this.ripples = [];
                this.swirls = [];
                this.stars = [];
                this.time = 0;
                this.initStars();
                this.initSwirls();
            }

            initStars() {
                this.stars = [];
                const starCount = 80;
                for (let i = 0; i < starCount; i++) {
                    this.stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: Math.random() * 2 + 0.5,
                        alpha: Math.random() * 0.8 + 0.2,
                        twinkle: Math.random() * Math.PI * 2,
                        twinkleSpeed: Math.random() * 0.03 + 0.01
                    });
                }
            }

            initSwirls() {
                this.swirls = [];
                const swirlCount = 5;
                for (let i = 0; i < swirlCount; i++) {
                    this.swirls.push({
                        centerX: width / 2 + (Math.random() - 0.5) * 200,
                        centerY: height / 2 + (Math.random() - 0.5) * 150,
                        radius: 150 + i * 80,
                        angle: Math.random() * Math.PI * 2,
                        speed: 0.0005 + Math.random() * 0.0003,
                        amplitude: 20 + Math.random() * 30
                    });
                }
            }

            addRipple(x, y, strength) {
                this.ripples.push({
                    x: x,
                    y: y,
                    radius: 0,
                    maxRadius: 150 + strength * 100,
                    strength: strength,
                    alpha: 1,
                    speed: 3 + strength * 2
                });
            }

            update() {
                this.time += 0.016;

                // 更新波纹
                for (let i = this.ripples.length - 1; i >= 0; i--) {
                    const r = this.ripples[i];
                    r.radius += r.speed;
                    r.alpha = 1 - (r.radius / r.maxRadius);
                    r.alpha *= 0.95;

                    if (r.alpha <= 0.01 || r.radius >= r.maxRadius) {
                        this.ripples.splice(i, 1);
                    }
                }

                // 更新星星闪烁
                this.stars.forEach(star => {
                    star.twinkle += star.twinkleSpeed;
                    star.currentAlpha = star.alpha * (0.6 + 0.4 * Math.sin(star.twinkle));
                });

                // 更新漩涡
                this.swirls.forEach(swirl => {
                    swirl.angle += swirl.speed;
                });

                // 鼠标移动产生波纹
                const dx = mouseX - prevMouseX;
                const dy = mouseY - prevMouseY;
                const speed = Math.sqrt(dx * dx + dy * dy);

                if (speed > 5 && Math.random() > 0.7) {
                    this.addRipple(mouseX, mouseY, Math.min(speed / 50, 1));
                }
            }

            draw() {
                const theme = themes[currentTheme];

                // 绘制基础渐变背景
                this.drawBackground(theme);

                // 绘制流体漩涡
                this.drawSwirls(theme);

                // 绘制波纹
                this.drawRipples(theme);

                // 绘制星星
                this.drawStars(theme);
            }

            drawBackground(theme) {
                // 创建复杂的径向渐变背景
                const gradient = ctx.createRadialGradient(
                    width / 2, height / 2, 0,
                    width / 2, height / 2, Math.max(width, height)
                );

                const colors = theme.colors.base;
                colors.forEach((color, i) => {
                    gradient.addColorStop(i / (colors.length - 1), color);
                });

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);

                // 添加微妙的噪点纹理
                ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
                for (let i = 0; i < 100; i++) {
                    const x = (Math.random() * width);
                    const y = (Math.random() * height);
                    ctx.fillRect(x, y, 2, 2);
                }
            }

            drawSwirls(theme) {
                const colors = theme.colors.swirl;

                this.swirls.forEach((swirl, index) => {
                    const color = colors[index % colors.length];

                    ctx.save();
                    ctx.translate(swirl.centerX, swirl.centerY);
                    ctx.rotate(swirl.angle);

                    // 绘制流动的水彩纹理
                    for (let i = 0; i < 8; i++) {
                        const radius = swirl.radius * (0.5 + i * 0.15);
                        const alpha = 0.15 - i * 0.015;

                        ctx.beginPath();
                        ctx.strokeStyle = this.hexToRgba(color, alpha);
                        ctx.lineWidth = 30 - i * 3;
                        ctx.lineCap = 'round';

                        // 绘制有机的流动曲线
                        for (let angle = 0; angle < Math.PI * 4; angle += 0.1) {
                            const r = radius + Math.sin(angle * 3 + this.time) * swirl.amplitude;
                            const x = Math.cos(angle) * r;
                            const y = Math.sin(angle) * r * 0.6;

                            if (angle === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                const prevAngle = angle - 0.1;
                                const prevR = radius + Math.sin(prevAngle * 3 + this.time) * swirl.amplitude;
                                const cpX = Math.cos(prevAngle + 0.05) * (prevR + r) / 2;
                                const cpY = Math.sin(prevAngle + 0.05) * (prevR + r) / 2 * 0.6;
                                ctx.quadraticCurveTo(cpX, cpY, x, y);
                            }
                        }
                        ctx.stroke();
                    }

                    ctx.restore();
                });
            }

            drawRipples(theme) {
                this.ripples.forEach(ripple => {
                    const color = theme.colors.highlight;

                    // 多层波纹效果
                    for (let i = 0; i < 3; i++) {
                        const r = ripple.radius - i * 15;
                        if (r > 0) {
                            const alpha = ripple.alpha * (0.4 - i * 0.1);

                            ctx.beginPath();
                            ctx.arc(ripple.x, ripple.y, r, 0, Math.PI * 2);
                            ctx.strokeStyle = this.hexToRgba(color, alpha);
                            ctx.lineWidth = 2 - i * 0.5;
                            ctx.stroke();

                            // 内发光
                            const gradient = ctx.createRadialGradient(
                                ripple.x, ripple.y, r * 0.8,
                                ripple.x, ripple.y, r
                            );
                            gradient.addColorStop(0, this.hexToRgba(color, 0));
                            gradient.addColorStop(1, this.hexToRgba(color, alpha * 0.5));

                            ctx.fillStyle = gradient;
                            ctx.fill();
                        }
                    }
                });
            }

            drawStars(theme) {
                const colors = theme.colors.star;

                this.stars.forEach(star => {
                    const color = colors[Math.floor(Math.random() * colors.length)];

                    ctx.save();
                    ctx.globalAlpha = star.currentAlpha;

                    // 星星光点
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();

                    // 星星十字光芒
                    if (star.size > 1.2) {
                        const glowSize = star.size * 4;
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 0.5;
                        ctx.globalAlpha = star.currentAlpha * 0.5;

                        ctx.beginPath();
                        ctx.moveTo(star.x - glowSize, star.y);
                        ctx.lineTo(star.x + glowSize, star.y);
                        ctx.moveTo(star.x, star.y - glowSize);
                        ctx.lineTo(star.x, star.y + glowSize);
                        ctx.stroke();
                    }

                    ctx.restore();
                });
            }

            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }

            resize() {
                this.initSwirls();
                this.initStars();
            }
        }

        const fluid = new FluidSystem();

        // 鼠标拖尾系统
        class MouseTrail {
            constructor() {
                this.points = [];
                this.maxLength = 25;
            }

            addPoint(x, y) {
                this.points.push({ x, y, alpha: 1 });
                if (this.points.length > this.maxLength) {
                    this.points.shift();
                }
            }

            update() {
                this.points.forEach(p => {
                    p.alpha *= 0.92;
                });
                this.points = this.points.filter(p => p.alpha > 0.01);
            }

            draw() {
                if (this.points.length < 2) return;

                const theme = themes[currentTheme];

                ctx.save();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // 绘制发光拖尾
                for (let i = 1; i < this.points.length; i++) {
                    const p1 = this.points[i - 1];
                    const p2 = this.points[i];
                    const alpha = p2.alpha;

                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);

                    const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                    gradient.addColorStop(0, `rgba(255, 255, 255, 0)`);
                    gradient.addColorStop(0.5, `rgba(255, 255, 255, ${alpha * 0.5})`);
                    gradient.addColorStop(1, `rgba(255, 255, 255, ${alpha})`);

                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 4 * alpha;
                    ctx.stroke();

                    // 外发光
                    ctx.shadowBlur = 15 * alpha;
                    ctx.shadowColor = theme.colors.highlight;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.restore();
            }
        }

        const trail = new MouseTrail();

        // 初始化
        function init() {
            resize();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            fluid.resize();
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 更新流体
            fluid.update();
            fluid.draw();

            // 更新拖尾
            trail.addPoint(mouseX, mouseY);
            trail.update();
            trail.draw();

            // 更新鼠标位置
            prevMouseX = mouseX;
            prevMouseY = mouseY;

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // 更新光标光晕
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 点击切换主题
        function switchTheme(index) {
            if (index === undefined) {
                currentTheme = (currentTheme + 1) % themes.length;
            } else {
                currentTheme = index;
            }

            // 更新指示器
            document.querySelectorAll('.bg-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentTheme);
            });

            // 更新光标颜色
            const theme = themes[currentTheme];
            const cursor = document.getElementById('cursor');
            cursor.style.background = `radial-gradient(circle,
                ${theme.colors.glow} 0%,
                ${theme.colors.glow.replace('0.2', '0.1')} 30%,
                transparent 60%
            )`;

            // 重新初始化
            fluid.initSwirls();
            fluid.initStars();
        }

        // 点击事件
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.bg-indicator')) {
                switchTheme();
                // 点击产生波纹
                fluid.addRipple(e.clientX, e.clientY, 1);
            }
        });

        // 指示器点击
        document.querySelectorAll('.bg-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                const index = parseInt(dot.dataset.bg);
                switchTheme(index);
            });
        });

        // 启动
        init();
        animate();
    </script>
</body>
</html>
