<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudia's Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #fbbf24 0%, #f472b6 50%, #ec4899 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 60px 50px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .intro {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        .highlight {
            color: #fef3c7;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2.5rem;
            }

            .intro {
                font-size: 1.1rem;
            }

            .container {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello I'm Claudia</h1>
        <p class="intro">
            热爱技术与创造的探索者，喜欢将想象变为现实。
            目前正在学习 Web 开发，期待用代码构建美好的数字世界。
            <span class="highlight">让我们一起创造无限可能！</span>
        </p>
    </div>
</body>
</html>
