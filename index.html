<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudia - Silk Dreams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        .intro {
            font-size: clamp(1rem, 2vw, 1.4rem);
            line-height: 2;
            color: rgba(255, 255, 255, 0.9);
            max-width: 500px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: width 0.15s, height 0.15s, border-width 0.15s;
        }

        .cursor.dragging {
            width: 14px;
            height: 14px;
            border-width: 2px;
            background: rgba(255, 255, 255, 0.15);
        }

        .bg-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 15px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        .bg-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .bg-dot.active {
            transform: scale(1.2);
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .bg-dot:nth-child(1) {
            background: linear-gradient(135deg, #ff69b4, #c8e6c9);
        }

        .bg-dot:nth-child(2) {
            background: linear-gradient(135deg, #f5f5dc, #8b4513);
        }

        .bg-dot:nth-child(3) {
            background: linear-gradient(135deg, #fff0f5, #e0f2f1);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="cursor" id="cursor"></div>

    <div class="content">
        <h1>Hello I'm Claudia</h1>
        <p class="intro">
            热爱技术与创造的探索者<br>
            喜欢将想象变为现实<br>
            让我们一起创造无限可能
        </p>
    </div>

    <div class="bg-indicator">
        <div class="bg-dot active" data-bg="0"></div>
        <div class="bg-dot" data-bg="1"></div>
        <div class="bg-dot" data-bg="2"></div>
    </div>

    <script>
        // 三种丝绸主题 - 新配色
        const themes = [
            {
                name: 'barbie-moss',
                // 芭比粉 × 奶苔绿
                top: { colors: ['#ff69b4', '#ff85c2', '#ffa0d0'], base: '#ff69b4' },
                bottom: { colors: ['#c8e6c9', '#a5d6a7', '#81c784'], stars: ['#ffffff', '#f1f8e9'] }
            },
            {
                name: 'xiang-pine',
                // 薄香 × 松果褐
                top: { colors: ['#f5f5dc', '#ebe5c5', '#e0dab0'], base: '#f5f5dc' },
                bottom: { colors: ['#8b4513', '#a0522d', '#cd853f'], stars: ['#ffffff', '#faf0e6'] }
            },
            {
                name: 'cream-bamboo',
                // 奶油粉 × 竹月色
                top: { colors: ['#fff0f5', '#ffe4e1', '#ffd6e7'], base: '#fff0f5' },
                bottom: { colors: ['#e0f2f1', '#b2dfdb', '#80cbc4'], stars: ['#ffffff', '#e8f5e9'] }
            }
        ];

        let currentTheme = 0;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let targetMouseX = mouseX;
        let targetMouseY = mouseY;

        // 丝绸变形网格
        const gridSize = 20;
        let grid = [];
        let silkOffset = [];

        function initGrid() {
            const cols = Math.ceil(width / gridSize) + 1;
            const rows = Math.ceil(height / gridSize) + 1;
            grid = [];
            silkOffset = [];

            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                silkOffset[i] = [];
                for (let j = 0; j < rows; j++) {
                    grid[i][j] = {
                        x: i * gridSize,
                        y: j * gridSize,
                        vx: 0,
                        vy: 0
                    };
                    silkOffset[i][j] = { x: 0, y: 0 };
                }
            }
        }

        // 绘制丝绸背景
        function drawSilk(theme, isTop) {
            const colors = isTop ? theme.top.colors : theme.bottom.colors;
            const parsedColors = colors.map(hex => ({
                r: parseInt(hex.slice(1, 3), 16),
                g: parseInt(hex.slice(3, 5), 16),
                b: parseInt(hex.slice(5, 7), 16)
            }));

            // 绘制扭曲的网格
            for (let i = 0; i < grid.length - 1; i++) {
                for (let j = 0; j < grid[i].length - 1; j++) {
                    const p1 = grid[i][j];
                    const p2 = grid[i + 1][j];
                    const p3 = grid[i + 1][j + 1];
                    const p4 = grid[i][j + 1];

                    // 计算颜色
                    const nx = i / grid.length;
                    const ny = j / grid[0].length;
                    const colorIdx = Math.floor((nx + ny) / 2 * (parsedColors.length - 1));
                    const c = parsedColors[Math.min(colorIdx, parsedColors.length - 1)];

                    // 添加丝绸光泽变化
                    const shine = Math.sin(i * 0.3 + j * 0.2) * 20;
                    const r = Math.min(255, c.r + shine);
                    const g = Math.min(255, c.g + shine);
                    const b = Math.min(255, c.b + shine);

                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.beginPath();
                    ctx.moveTo(p1.x + silkOffset[i][j].x, p1.y + silkOffset[i][j].y);
                    ctx.lineTo(p2.x + silkOffset[i + 1][j].x, p2.y + silkOffset[i + 1][j].y);
                    ctx.lineTo(p3.x + silkOffset[i + 1][j + 1].x, p3.y + silkOffset[i + 1][j + 1].y);
                    ctx.lineTo(p4.x + silkOffset[i][j + 1].x, p4.y + silkOffset[i][j + 1].y);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // 如果是底层，绘制星星
            if (!isTop && theme.bottom.stars) {
                drawStars(theme.bottom.stars);
            }
        }

        function drawStars(starColors) {
            const time = Date.now() * 0.001;

            for (let i = 0; i < 50; i++) {
                const x = ((i * 137.5 + time * 10) % 1) * width;
                const y = ((i * 73.3 + Math.sin(time + i) * 50) % 1) * height;
                const twinkle = Math.sin(time * 2 + i);
                const alpha = 0.5 + 0.3 * twinkle;
                const size = 1 + Math.sin(i) * 0.5;

                const color = starColors[i % starColors.length];
                ctx.fillStyle = color;
                ctx.globalAlpha = alpha;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();

                if (size > 1) {
                    ctx.globalAlpha = alpha * 0.5;
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 0.5;
                    const glow = size * 3;
                    ctx.beginPath();
                    ctx.moveTo(x - glow, y);
                    ctx.lineTo(x + glow, y);
                    ctx.moveTo(x, y - glow);
                    ctx.lineTo(x, y + glow);
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1;
        }

        // 更新丝绸变形（模拟手指滑过）
        function updateSilk() {
            const influenceRadius = 150;
            const springStrength = 0.1;
            const damping = 0.85;

            for (let i = 0; i < grid.length; i++) {
                for (let j = 0; j < grid[i].length; j++) {
                    const point = grid[i][j];
                    const offset = silkOffset[i][j];

                    // 计算到鼠标的距离
                    const dx = point.x - mouseX;
                    const dy = point.y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < influenceRadius) {
                        const force = (1 - dist / influenceRadius) * 30;
                        const angle = Math.atan2(dy, dx);

                        // 丝绸被推开的力
                        offset.vx = (offset.vx || 0) + Math.cos(angle) * force * 0.3;
                        offset.vy = (offset.vy || 0) + Math.sin(angle) * force * 0.3;
                    }

                    // 弹性恢复
                    offset.vx = (offset.vx || 0) - offset.x * springStrength;
                    offset.vy = (offset.vy || 0) - offset.y * springStrength;

                    // 阻尼
                    offset.vx = (offset.vx || 0) * damping;
                    offset.vy = (offset.vy || 0) * damping;

                    // 应用位移
                    offset.x += offset.vx;
                    offset.y += offset.vy;
                }
            }
        }

        // 渲染循环
        let isDirty = true;

        function render() {
            // 平滑插值鼠标位置
            mouseX += (targetMouseX - mouseX) * 0.15;
            mouseY += (targetMouseY - mouseY) * 0.15;

            // 更新丝绸变形
            updateSilk();

            // 清空画布
            ctx.clearRect(0, 0, width, height);

            const theme = themes[currentTheme];

            // 绘制底层（金色/蓝色星空）
            drawSilk(theme, false);

            // 使用遮罩绘制上层（被拨开的丝绸）
            ctx.save();

            // 创建遮罩
            ctx.beginPath();
            for (let i = 0; i < grid.length - 1; i++) {
                for (let j = 0; j < grid[i].length - 1; j++) {
                    const offset = silkOffset[i][j];
                    const x = grid[i][j].x + offset.x;
                    const y = grid[i][j].y + offset.y;

                    // 根据变形程度计算透明度
                    const deformation = Math.sqrt(offset.x * offset.x + offset.y * offset.y);
                    const alpha = Math.min(deformation / 50, 0.9);

                    if (alpha > 0.1) {
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = theme.top.base;
                        ctx.beginPath();
                        ctx.arc(x, y, 25, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            ctx.restore();

            // 绘制完整的上层（使用混合模式实现推开效果）
            ctx.save();
            ctx.globalCompositeOperation = 'source-over';

            // 创建推开遮罩
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = width;
            maskCanvas.height = height;
            const maskCtx = maskCanvas.getContext('2d');

            // 在遮罩上绘制黑色（不透明）和透明区域
            maskCtx.fillStyle = 'black';
            maskCtx.fillRect(0, 0, width, height);

            // 鼠标周围是透明的（推开区域）
            for (let i = 0; i < grid.length; i++) {
                for (let j = 0; j < grid[i].length; j++) {
                    const offset = silkOffset[i][j];
                    const deformation = Math.sqrt(offset.x * offset.x + offset.y * offset.y);

                    if (deformation > 5) {
                        const x = grid[i][j].x;
                        const y = grid[i][j].y;
                        const radius = Math.min(deformation * 0.8, 60);

                        const gradient = maskCtx.createRadialGradient(x, y, 0, x, y, radius);
                        gradient.addColorStop(0, `rgba(0,0,0,${1 - Math.min(deformation / 50, 0.95)})`);
                        gradient.addColorStop(1, 'black');

                        maskCtx.fillStyle = gradient;
                        maskCtx.beginPath();
                        maskCtx.arc(x, y, radius, 0, Math.PI * 2);
                        maskCtx.fill();
                    }
                }
            }

            // 使用遮罩
            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(maskCanvas, 0, 0);

            // 绘制上层丝绸
            ctx.globalCompositeOperation = 'source-over';
            drawSilk(theme, true);

            ctx.restore();

            // 更新光标
            const cursor = document.getElementById('cursor');
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';

            requestAnimationFrame(render);
        }

        function init() {
            resize();
            render();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initGrid();
        }

        // 鼠标事件
        document.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });

        document.addEventListener('mousedown', () => {
            document.getElementById('cursor').classList.add('dragging');
        });

        document.addEventListener('mouseup', () => {
            document.getElementById('cursor').classList.remove('dragging');
        });

        // 触摸支持
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            targetMouseX = touch.clientX;
            targetMouseY = touch.clientY;
        }, { passive: true });

        // 切换主题
        function switchTheme(index) {
            currentTheme = index !== undefined ? index : (currentTheme + 1) % 3;

            document.querySelectorAll('.bg-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentTheme);
            });

            // 重置丝绸变形
            for (let i = 0; i < silkOffset.length; i++) {
                for (let j = 0; j < silkOffset[i].length; j++) {
                    silkOffset[i][j] = { x: 0, y: 0, vx: 0, vy: 0 };
                }
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.bg-indicator')) {
                switchTheme();
            }
        });

        document.querySelectorAll('.bg-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                switchTheme(parseInt(dot.dataset.bg));
            });
        });

        window.addEventListener('resize', resize);

        // 初始化
        init();
    </script>
</body>
</html>
